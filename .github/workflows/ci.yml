name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ---------------------------------------------------------------------------
  # Primary CI gate: lint → typecheck → unit tests → workers tests
  # Each step fails-fast so the pipeline stops on first error.
  # ---------------------------------------------------------------------------
  ci:
    name: Lint, typecheck, unit tests, workers tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # Node 22 required for @cloudflare/vitest-pool-workers (workerd runtime).
          # Node ≥22.9 is also needed for @cloudflare/vite-plugin used in E2E builds.
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Workers tests (workerd runtime)
        run: npm run test:workers

      - name: Build
        run: npm run build

  # ---------------------------------------------------------------------------
  # E2E tests — requires Node ≥22.9 for @cloudflare/vite-plugin.
  # Runs after the main CI gate passes.
  # Soft-fails (continue-on-error: true) until the E2E environment is fully
  # configured (Playwright install, preview deploy, test secrets).
  #
  # To make E2E hard-fail: remove `continue-on-error: true`.
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    needs: ci
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js (≥22.9 for @cloudflare/vite-plugin)
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Turso CLI (e2e-server.sh runs a local `turso dev` libSQL server)
        run: |
          curl -sSfL https://get.tur.so/install.sh | bash
          echo "$HOME/.turso" >> "$GITHUB_PATH"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build for E2E (with test auth enabled)
        run: npm run build:e2e
        env:
          VITE_TEST_AUTH_ENABLED: "true"

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          TURSO_DATABASE_URL: ${{ secrets.TEST_TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TEST_TURSO_AUTH_TOKEN }}
          BETTER_AUTH_SECRET: ${{ secrets.TEST_BETTER_AUTH_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.TEST_GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.TEST_GOOGLE_CLIENT_SECRET }}
          VAPID_SUBJECT: ${{ secrets.TEST_VAPID_SUBJECT }}
          VAPID_PUBLIC_KEY: ${{ secrets.TEST_VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.TEST_VAPID_PRIVATE_KEY }}

  # ---------------------------------------------------------------------------
  # Deploy to Cloudflare Workers — runs ONLY on push to main, and ONLY after
  # the primary CI gate (lint/typecheck/unit/workers/build) passes.
  #
  # This closes the delivery gap: previously `main` was green in CI but deploys
  # were 100% manual (`npm run deploy`), so settlement fixes never reached prod.
  # Gated on `ci` (not `e2e`, which soft-fails via continue-on-error).
  #
  # Required repo secrets:
  #   CLOUDFLARE_API_TOKEN   — token with "Edit Cloudflare Workers" permission
  #   CLOUDFLARE_ACCOUNT_ID  — target account id
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
